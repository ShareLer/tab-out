<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab View</title>

  <!-- Google Fonts: Newsreader (for headings/numbers) + DM Sans (for body text) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ================================================================
     MAIN LAYOUT — sidebar on left, content on right
     ================================================================ -->
<div class="main-layout">

  <!-- ================================================================
       SIDEBAR — greeting, date, and future content
       ================================================================ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-content">
      <!-- "Good afternoon" — written by getGreeting() in app.js -->
      <h1 id="greeting"></h1>
      <!-- "Friday, April 4, 2026" — written by getDateDisplay() in app.js -->
      <div class="sidebar-date" id="dateDisplay"></div>
    </div>
  </aside>

  <!-- ================================================================
       RESIZER — draggable divider between sidebar and content
       ================================================================ -->
  <div class="sidebar-resizer" id="sidebarResizer"></div>

  <!-- ================================================================
       CONTENT AREA — quick links, open tabs, saved for later
       ================================================================ -->
  <div class="content-area">

    <!-- ================================================================
         QUICK LINKS SECTION — always visible at the top
         Plus button moved here for adding new links
         ================================================================ -->
    <div class="quick-links-section" id="quickLinksSection">
      <div class="section-header">
        <h2>Quick links</h2>
        <div class="section-line"></div>
        <div class="section-count" id="quickLinksCount"></div>
        <button class="add-link-btn" data-action="show-add-link-modal" title="Add a quick link">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
        </button>
      </div>
      <div class="quick-links-container" id="quickLinksContainer"></div>
      <!-- Empty state message shown when no links -->
      <div class="quick-links-empty" id="quickLinksEmpty" style="display:none">
        Click the + button above to add your favorite pages
      </div>
    </div>

    <!-- ================================================================
         MAIN CONTENT AREA — two-column layout
         Left: open tabs (domain/mission cards)
         Right: saved for later checklist
         The right column only renders when it has items (JS controls this)
         ================================================================ -->
    <div class="dashboard-columns" id="dashboardColumns">

      <!-- LEFT COLUMN: Open tabs -->
      <div class="active-section" id="openTabsSection" style="display:none">
        <div class="section-header">
          <h2 id="openTabsSectionTitle">Right now</h2>
          <div class="section-line"></div>
          <div class="section-count" id="openTabsSectionCount"></div>
        </div>
        <div class="missions" id="openTabsMissions"></div>
      </div>

      <!-- RIGHT COLUMN: Recently Closed -->
      <div class="deferred-column" id="deferredColumn">
        <div class="section-header">
          <button class="toggle-collapse-btn" id="recentlyClosedToggle" title="Toggle Recently Closed">
            <svg class="toggle-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" /></svg>
          </button>
          <h2>Recently Closed</h2>
          <div class="section-line"></div>
          <div class="section-count" id="deferredCount"></div>
          <button class="action-btn clear-all-btn" data-action="clear-all-recent" style="font-size:11px;padding:3px 10px;" title="Clear all recently closed tabs">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
            Clear all
          </button>
        </div>

        <!-- Recently closed items — injected by renderRecentlyClosedColumn() in app.js -->
        <div class="deferred-list" id="deferredList"></div>

        <!-- Empty state — shown when no recently closed tabs -->
        <div class="deferred-empty" id="deferredEmpty">
          No recently closed tabs
        </div>
      </div>

    </div><!-- end .dashboard-columns -->

    <!-- ================================================================
         FOOTER — global stats + refresh control
         ================================================================ -->
    <footer>
      <div class="footer-stats">
        <div class="stat">
          <div class="stat-num" id="statTabs">—</div>
          <div class="stat-label">Open tabs</div>
        </div>
      </div>
      <div class="last-refresh">
        <span style="color: var(--muted); font-size: 11px;"><a href="https://github.com/zarazhangrui/tab-view" target="_top" style="color: var(--muted); text-decoration: underline; text-underline-offset: 2px;">Tab View</a> by <a href="https://x.com/zarazhangrui" target="_top" style="color: var(--muted); text-decoration: underline; text-underline-offset: 2px;">Zara</a></span>
      </div>
    </footer>

  </div><!-- end .content-area -->

</div><!-- end .main-layout -->

<!-- ================================================================
     ADD LINK MODAL — popup form for adding quick links
     Hidden by default, shown when user clicks the plus button
     ================================================================ -->
<div class="modal-overlay" id="addLinkModal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3>Add Quick Link</h3>
      <button class="modal-close" data-action="close-add-link-modal" title="Close">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label for="addLinkUrl">URL</label>
        <input type="url" id="addLinkUrl" placeholder="https://example.com" required>
      </div>
      <div class="modal-field">
        <label for="addLinkTitle">Title (optional)</label>
        <input type="text" id="addLinkTitle" placeholder="Example Page">
      </div>
      <div class="modal-actions">
        <button class="action-btn" data-action="close-add-link-modal">Cancel</button>
        <button class="action-btn primary" data-action="save-quick-link">Add Link</button>
      </div>
    </div>
  </div>
</div>

<!-- ================================================================
     TOAST — floats above everything, used for action confirmations
     Hidden by default via CSS (opacity:0, translateY)
     ================================================================ -->
<div class="toast" id="toast">
  <!-- Checkmark circle icon (Heroicons outline) -->
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  </svg>
  <span id="toastText"></span>
</div>

<!-- Personal config (gitignored) — defines LOCAL_LANDING_PAGE_PATTERNS etc. -->
<!-- If the file doesn't exist, that's fine — app.js uses sensible defaults. -->
<script src="config.local.js"></script>

<!-- Main dashboard logic — loads last so the DOM is ready -->
<script src="app.js"></script>
</body>
</html>
